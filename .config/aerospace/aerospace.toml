# Workspace 6: Text Editors
[[on-window-detected]]
if.app-id = 'com.apple.TextEdit'
check-further-callbacks = true
run = 'move-node-to-workspace 6'

[[on-window-detected]]
if.app-id = 'com.vscodium'
check-further-callbacks = true
run = 'move-node-to-workspace 6'


# Workspace 7: Audio & Recording
[[on-window-detected]]
if.app-id = 'com.obsproject.obs-studio'
check-further-callbacks = true
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'org.audacityteam.audacity'
check-further-callbacks = true
run = 'move-node-to-workspace 7'

[[on-window-detected]]
